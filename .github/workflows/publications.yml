name: Build Publications Data

on:
  workflow_dispatch:
  push:
    paths:
      - "papers/papers.json"
      - "scripts/build_papers_data.js"

permissions:
  contents: write

jobs:
  build-publications:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate papers/data.js
        run: node scripts/build_papers_data.js

      - name: Commit generated data
        run: |
          if git diff --quiet -- papers/data.js; then
            echo "papers/data.js is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add papers/data.js
          git commit -m "Build publications data"
          git push
